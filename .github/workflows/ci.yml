name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25', '1.26']
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('server/go.sum', 'server/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Verify gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt violations:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: server
          args: --timeout=5m

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build server binary
        run: go build -o /dev/null ./cmd/server

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage.out
          if-no-files-found: error
          retention-days: 14

  frontend:
    name: frontend (node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  status:
    name: status
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate results
        run: |
          backend="${{ needs.backend.result }}"
          frontend="${{ needs.frontend.result }}"
          echo "backend: $backend"
          echo "frontend: $frontend"
          if [ "$backend" != "success" ] || [ "$frontend" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
